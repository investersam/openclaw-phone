#!KAMAILIO
#
# OpenClaw Phone - Kamailio Configuration
# Replaces drachtio for SIP signaling
#

#!define WITH_DEBUG
#!define WITH_MYSQL
#!define WITH_AUTH
#!define WITH_USRLOCDB
#!define WITH_ACCDB
#!define WITH_DIALPLAN

# Listen on UDP/TCP for SIP
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060

# Logging
debug=3
log_stderror=no
memdbg=5
memlog=5

# Core settings
fork=yes
children=4
worker_cpus=no

# Set server signature
server_signature=yes
server_header="OpenClaw-Phone/Kamailio"
user_agent_header="OpenClaw-Phone/1.0"

# Modules loading
mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules/"

loadmodule "db_mysql.so"
loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "cfg_rpc.so"
loadmodule "acc.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "auth.so"
loadmodule "auth_db.so"
loadmodule "dialog.so"
loadmodule "rtpengine.so"
loadmodule "http_async_client.so"
loadmodule "uac.so"

# Module parameters
modparam("jsonrpcs", "pretty_format", 1)

modparam("db_mysql", "ping_interval", 60)
modparam("db_mysql", "auto_reconnect", 1)

modparam("auth_db", "db_url", DBURL)
modparam("auth_db", "calculate_ha1", 1)
modparam("auth_db", "password_column", "password")
modparam("auth_db", "user_column", "username")
modparam("auth_db", "domain_column", "domain")

modparam("usrloc", "db_url", DBURL)
modparam("usrloc", "db_mode", 2)
modparam("usrloc", "use_domain", 1)
modparam("usrloc", "desc_time_order", 1)
modparam("usrloc", "matching_mode", 0)

modparam("registrar", "use_domain", 1)
modparam("registrar", "min_expires", 60)
modparam("registrar", "max_expires", 3600)
modparam("registrar", "default_expires", 1800)
modparam("registrar", "received_avp", "$avp(received)")

modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:7722")
modparam("rtpengine", "rtpengine_disable_tout", 30)
modparam("rtpengine", "rtpengine_tout", 1)
modparam("rtpengine", "rtpengine_retr", 2)

modparam("http_async_client", "timeout", 5000)

modparam("dialog", "db_url", DBURL)
modparam("dialog", "enable_stats", 1)
modparam("dialog", "track_cseq_updates", 1)

modparam("acc", "db_url", DBURL)
modparam("acc", "early_media", 1)
modparam("acc", "report_ack", 1)
modparam("acc", "report_cancels", 1)
modparam("acc", "detect_direction", 1)

# Routing Logic
request_route {
    # Per request initial checks
    route(REQINIT);

    # NAT detection
    route(NATDETECT);

    # CANCEL processing
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            t_relay();
        }
        exit;
    }

    # Handle retransmissions
    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }

    # Record route for dialog-forming requests
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # Route preloaded requests
    if (loose_route()) {
        if (is_method("BYE")) {
            # End dialog and notify voice app
            route(NOTIFY_HANGUP);
        }
        t_relay();
        exit;
    }

    # Handle registrations
    if (is_method("REGISTER")) {
        route(REGISTER);
        exit;
    }

    # Authentication for other methods
    if (!is_method("OPTIONS|ACK")) {
        route(AUTH);
    }

    # Handle INVITEs - send to voice app
    if (is_method("INVITE")) {
        route(HANDLE_INVITE);
        exit;
    }

    # Default: 404
    sl_send_reply("404", "Not here");
    exit;
}

# Initial request checks
route[REQINIT] {
    if (!sanity_check("1511", "7")) {
        xlog("Malformed SIP message from $si:$sp\n");
        exit;
    }

    if (!mf_process_maxfwd_header("70")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (!t_set_fr(0, "10")) {
        sl_send_reply("500", "Internal Server Error");
        exit;
    }
}

# Registration handling
route[REGISTER] {
    # Check if registration is for our domain
    if (!is_myself("$fd")) {
        sl_send_reply("403", "Forbidden - not my domain");
        exit;
    }

    # Require authentication
    if (!www_authorize("$fd", "subscriber")) {
        www_challenge("$fd", "0");
        exit;
    }

    if (!check_to()) {
        sl_send_reply("403", "Forbidden - To/From mismatch");
        exit;
    }

    # Add received header for NAT
    if (nat_uac_test("19")) {
        fix_nated_register();
        setbflag(6);
    }

    # Save registration
    if (!save("location", "0x01", "$avp(received)")) {
        sl_reply_error();
    }

    # Notify voice app of registration
    route(NOTIFY_REGISTRATION);
    exit;
}

# Authentication
route[AUTH] {
    if (!is_myself("$fd")) {
        # Not our domain - forward or reject
        if (!allow_trusted()) {
            sl_send_reply("403", "Forbidden");
            exit;
        }
        return;
    }

    if (is_method("REGISTER|INVITE|ACK|BYE|CANCEL|UPDATE|PRACK|REFER")) {
        if (!proxy_authorize("$fd", "subscriber")) {
            proxy_challenge("$fd", "0");
            exit;
        }
        if (!check_from()) {
            sl_send_reply("403", "Forbidden - From mismatch");
            exit;
        }
    }
    consume_credentials();
}

# INVITE handling - route to voice app
route[HANDLE_INVITE] {
    # Create dialog
    dlg_manage();

    # Get extension from RURI
    $var(extension) = $(ruri{uri.user});
    $var(call_id) = $ci;
    $var(from_user) = $fU;
    $var(to_user) = $tU;

    xlog("L_INFO", "[KAMAILIO] INVITE received for extension $var(extension) from $var(from_user)\n");

    # Check if extension is registered
    if (!registered("location", "$tU@$td", 2, $avp(contact))) {
        xlog("L_WARN", "[KAMAILIO] Extension $tU not registered\n");
        sl_send_reply("404", "Not Found");
        exit;
    }

    # Offer RTP to rtpengine
    rtpengine_offer("replace-origin replace-session-connection ICE=remove");

    # Forward INVITE to voice app via HTTP
    route(FORWARD_TO_VOICE_APP);
}

# Forward call to voice app
route[FORWARD_TO_VOICE_APP] {
    # Build HTTP request to voice app
    $var(http_body) = '{"callId":"' + $ci + '","from":"' + $fU + '","to":"' + $tU + '","extension":"' + $(ruri{uri.user}) + '"}';

    xlog("L_INFO", "[KAMAILIO] Forwarding to voice app: $var(http_body)\n");

    # Async HTTP POST to voice app
    http_async_query("http://127.0.0.1:3000/sip/invite",
        "application/json",
        "$var(http_body)",
        "CONTINUE_INVITE");
    exit;
}

route[CONTINUE_INVITE] {
    # Check HTTP response
    if ($http_async_id == 0) {
        # Success - forward INVITE
        xlog("L_INFO", "[KAMAILIO] Voice app accepted call\n");

        # Route to voice app (which acts as SIP endpoint)
        $du = "sip:voice-app@127.0.0.1:5070";
        t_on_reply("MANAGE_RTP");
        t_relay();
    } else {
        xlog("L_ERR", "[KAMAILIO] Voice app rejected call: $http_async_err\n");
        sl_send_reply("503", "Voice App Unavailable");
    }
}

# RTP management on replies
onreply_route[MANAGE_RTP] {
    if (nat_uac_test("1")) {
        fix_nated_contact();
    }

    # Manage RTP for 200 OK
    if (t_check_status("200")) {
        rtpengine_answer("replace-origin replace-session-connection ICE=remove");
    }
}

# Notify voice app of hangup
route[NOTIFY_HANGUP] {
    $var(http_body) = '{"callId":"' + $ci + '","event":"hangup","from":"' + $fU + '","to":"' + $tU + '"}';

    http_async_query("http://127.0.0.1:3000/sip/bye",
        "application/json",
        "$var(http_body)",
        "NOOP");
}

# Notify voice app of registration
route[NOTIFY_REGISTRATION] {
    $var(http_body) = '{"extension":"' + $tU + '","contact":"' + $ct + '","event":"register"}';

    http_async_query("http://127.0.0.1:3000/sip/register",
        "application/json",
        "$var(http_body)",
        "NOOP");
}

# NAT detection
route[NATDETECT] {
    force_rport();
    if (nat_uac_test("19")) {
        if (is_method("REGISTER")) {
            fix_nated_register();
        } else {
            if(subst_hf("Contact", "/;nat=yes/g", "f")) {
                set_contact_alias();
            }
        }
        setbflag(6);
    }
}

route[NOOP] {
    # No-op for async callbacks that don't need handling
}

# Reply handling
reply_route {
    if (nat_uac_test("1")) {
        fix_nated_contact();
    }
}

# Branch route
branch_route[MANAGE_BRANCH] {
    xlog("New branch [$T_branch_idx] to $ru\n");
}

# Failure route
failure_route[RTF_FAILURE] {
    xlog("Failure route triggered\n");

    if (t_is_canceled()) {
        exit;
    }

    # Try next routes or send error
    if (t_check_status("401|407")) {
        # Auth required - should have been handled
        t_reply("403", "Forbidden");
        exit;
    }

    if (t_check_status("486|600")) {
        t_reply("486", "Busy");
        exit;
    }

    if (t_check_status("408|480")) {
        t_reply("408", "Timeout");
        exit;
    }
}
