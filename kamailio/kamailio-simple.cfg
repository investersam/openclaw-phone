#!KAMAILIO
#
# OpenClaw Phone - Simplified Kamailio Configuration
# Routes SIP traffic to FreeSWITCH, notifies voice app via HTTP
#

# Debugging
#!define WITH_DEBUG

# Core configuration
fork=yes
children=4

# Listen on all interfaces
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060

# Logging
debug=3
log_stderror=no

# DNS
use_dns_cache=off

# Modules
mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules/"

loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "cfg_rpc.so"
loadmodule "http_async_client.so"
loadmodule "rtpengine.so"

# Module parameters
modparam("jsonrpcs", "pretty_format", 1)

# RTPengine connection
modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:7722")

# HTTP async client timeout
modparam("http_async_client", "timeout", 5000)

# Route all requests
request_route {
    # Sanity checks
    if (!sanity_check("1511", "7")) {
        xlog("Malformed message from $si\n");
        exit;
    }

    # Max forwards
    if (!mf_process_maxfwd_header("70")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # Handle CANCEL
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            t_relay();
        }
        exit;
    }

    # Handle retransmissions
    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }

    # Record route for dialog-forming requests
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # Loose routing for in-dialog requests
    if (loose_route()) {
        if (is_method("BYE")) {
            route(NOTIFY_HANGUP);
        }
        t_relay();
        exit;
    }

    # Handle registrations
    if (is_method("REGISTER")) {
        route(HANDLE_REGISTER);
        exit;
    }

    # Handle INVITEs
    if (is_method("INVITE")) {
        route(HANDLE_INVITE);
        exit;
    }

    # Handle OPTIONS (ping/keepalive)
    if (is_method("OPTIONS")) {
        options_reply();
        exit;
    }

    # Default: reject
    sl_send_reply("404", "Not Found");
}

# Registration handling
route[HANDLE_REGISTER] {
    # Forward registrations to FreeSWITCH
    # FreeSWITCH handles authentication and location
    $du = "sip:127.0.0.1:5080";

    # Notify voice app
    $var(http_body) = '{"event":"register","extension":"' + $tU + '","contact":"' + $ct + '","from":"' + $si + '"}';
    http_async_query("http://127.0.0.1:3000/sip/event", "application/json", "$var(http_body)", "NOOP");

    t_relay();
}

# INVITE handling - forward to FreeSWITCH
route[HANDLE_INVITE] {
    # Set RTP offer
    rtpengine_offer("replace-origin replace-session-connection ICE=remove");

    # Forward to FreeSWITCH
    $du = "sip:127.0.0.1:5080";

    # Notify voice app of new call
    $var(http_body) = '{"event":"invite","callId":"' + $ci + '","from":"' + $fU + '","to":"' + $tU + '","extension":"' + $rU + '"}';
    http_async_query("http://127.0.0.1:3000/sip/event", "application/json", "$var(http_body)", "NOOP");

    # Forward INVITE
    t_on_reply("MANAGE_RTP");
    t_on_failure("HANDLE_FAILURE");
    t_relay();
}

# Manage RTP in replies
onreply_route[MANAGE_RTP] {
    if (t_check_status("200")) {
        rtpengine_answer("replace-origin replace-session-connection ICE=remove");
    }
}

# Handle failures
failure_route[HANDLE_FAILURE] {
    xlog("Failure: $T_reply_code\n");

    # Notify voice app
    $var(http_body) = '{"event":"failure","callId":"' + $ci + '","code":"' + $T_reply_code + '"}';
    http_async_query("http://127.0.0.1:3000/sip/event", "application/json", "$var(http_body)", "NOOP");
}

# Notify hangup
route[NOTIFY_HANGUP] {
    $var(http_body) = '{"event":"bye","callId":"' + $ci + '","from":"' + $fU + '","to":"' + $tU + '"}';
    http_async_query("http://127.0.0.1:3000/sip/event", "application/json", "$var(http_body)", "NOOP");
}

route[NOOP] {
    # Async callback - nothing to do
}

# Reply handling
reply_route {
    if (nat_uac_test("1")) {
        fix_nated_contact();
    }
}
