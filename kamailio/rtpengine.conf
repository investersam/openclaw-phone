# rtpengine configuration for OpenClaw Phone
# Replaces FreeSWITCH for RTP handling

[rtpengine]
# Listen on UDP for control messages from Kamailio
listen-ng = 127.0.0.1:7722

# Listen interfaces for RTP
delete-delay = 30

# Port range for RTP traffic (same as FreeSWITCH config)
port-min = 30000
port-max = 30100

# Number of threads
num-threads = 4

# Log level
log-level = 6

# Log to stderr (captured by Docker)
log-stderr = true

# Recording options
recording-dir = /tmp/rtp-recordings
recording-pattern = %Y%m%d-%H%M%S-%c.mp3

# Media options
codecs = opus,pcmu,pcma,g722,speex

# Timeout settings
timeout = 60
silent-timeout = 3600
final-timeout = 7200

# TOS
tos = 184

# ICE options
ice-ignore = true

# Redis for persistence (optional, for HA)
# redis = 127.0.0.1:6379/42

# Control socket permissions
# control-tos = 184

# Graphite stats (optional)
# graphite = 127.0.0.1:2003
# graphite-prefix = openclaw.
