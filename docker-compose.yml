version: '3.8'

# CRITICAL: All containers must use network_mode: host
# Docker bridge networking causes FreeSWITCH to advertise internal IPs
# in SDP, making RTP unreachable from external callers.

services:
  # Option 1: drachtio (default, simpler)
  # Comment out this section to use Kamailio instead
  drachtio:
    image: docker.io/drachtio/drachtio-server:latest
    container_name: drachtio
    restart: unless-stopped
    network_mode: host
    command: >
      drachtio
      --contact "sip:*:5060;transport=tcp,udp"
      --external-ip ${EXTERNAL_IP}
      --secret ${DRACHTIO_SECRET:-cymru}
      --port 9022
      --loglevel info
    # Ports (for reference - host mode doesn't need port mapping):
    # - 5060: SIP UDP/TCP
    # - 9022: Admin/App Port

  # Option 2: Kamailio (advanced, more flexible)
  # Uncomment this section to use Kamailio instead of drachtio
  # kamailio:
  #   image: kamailio/kamailio-ci:latest
  #   container_name: kamailio
  #   restart: unless-stopped
  #   network_mode: host
  #   volumes:
  #     - ./kamailio/kamailio-simple.cfg:/etc/kamailio/kamailio.cfg:ro
  #   command: >
  #     kamailio
  #     -f /etc/kamailio/kamailio.cfg
  #     -D
  #   # Ports (for reference):
  #   # - 5060: SIP UDP/TCP

  freeswitch:
    image: docker.io/drachtio/drachtio-freeswitch-mrf:latest
    container_name: freeswitch
    restart: unless-stopped
    network_mode: host
    command: >
      freeswitch
      --sip-port 5080
      --rtp-range-start 30000
      --rtp-range-end 30100
      --ext-rtp-ip ${EXTERNAL_IP}
      --ext-sip-ip ${EXTERNAL_IP}
      --advertise-external-ip
    environment:
      # CRITICAL: Set this to your server's LAN IP
      # This IP goes into SDP packets so 3CX knows where to send audio
      # Note: drachtio-freeswitch-mrf only accepts CLI flags, not env vars
      - EXTERNAL_IP=${EXTERNAL_IP}
    # Ports (for reference):
    # - 8021: ESL (Event Socket Library)
    # - 5080: Internal SIP
    # - 30000-30100: RTP Audio (changed from 20000-20100 to avoid conflict with 3CX SBC)

  voice-app:
    build: ./voice-app
    container_name: voice-app
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      # Audio files directory for TTS playback
      - ./voice-app/audio:/app/audio
      # Device configurations
      - ./voice-app/config:/app/config
    depends_on:
      - freeswitch
      # When using drachtio:
      - drachtio
      # When using Kamailio (comment out drachtio above, uncomment below):
      # - kamailio
    # Ports (for reference):
    # - 3000: HTTP API
    # - 3001: WebSocket for audio streaming
